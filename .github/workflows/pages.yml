name: Deploy GitHub Pages

# Publica o conteúdo agregado de docs/ (painel HTML) no GitHub Pages.
# O painel é gerado LOCALMENTE (onde ficam os dados/credenciais) e commitado em
# docs/ — sem PII. Este CI apenas faz o deploy do que está em docs/.
# DESLIGADO como deploy automático em 24/07/2026: a produção do GitHub Pages
# passou para o pipeline Astro (pages-astro.yml). Mantido só como manual
# (workflow_dispatch) para fallback do site antigo em docs/. Dois deploys de
# Pages não podem rodar em push ao mesmo tempo (mesmo concurrency group).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - name: Gerar PDFs dos relatórios de extensão (LibreOffice)
        run: |
          if ls docs/relatorios-odt/*.odt >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends libreoffice-writer
            soffice --headless --convert-to pdf --outdir docs/relatorios-odt docs/relatorios-odt/*.odt
            echo "PDFs gerados: $(ls docs/relatorios-odt/*.pdf | wc -l)"
          else
            echo "sem .odt em docs/relatorios-odt — nada a converter"
          fi
      - name: Empacotar dados abertos (ZIP)
        run: |
          cd docs
          rm -f dados-abertos.zip
          zip -r -q dados-abertos.zip api llms.txt relatorios-odt \
            -x '*.DS_Store' || true
          echo "ZIP: $(du -h dados-abertos.zip | cut -f1)"
          cd ..
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
