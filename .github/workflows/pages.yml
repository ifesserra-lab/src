name: Deploy GitHub Pages

# Publica o conteúdo agregado de docs/ (painel HTML) no GitHub Pages.
# O painel é gerado LOCALMENTE (onde ficam os dados/credenciais) e commitado em
# docs/ — sem PII. Este CI apenas faz o deploy do que está em docs/.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
