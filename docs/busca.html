<!doctype html><html lang='pt-br'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>SRC · Campus Serra — Buscar</title><style>
/* Design system (skill ui-ux-pro-max): Data-Dense Dashboard
   Primary #3B82F6 · CTA #F97316 · bg #F8FAFC · text #1E293B · Fira Sans + Fira Code */
@import url('https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap');
:root{
  color-scheme:light;
  --plane:#f8fafc; --surface-1:#ffffff; --parchment:#f1f5f9; --pearl:#f8fafc;
  --text-primary:#1e293b; --text-secondary:#475569; --muted:#64748b;
  --grid:#e2e8f0; --border:#cbd5e1;
  --series-1:#3b82f6; --accent-focus:#2563eb; --cta:#f97316; --nav-bg:#ffffff;
  --row-hover:#eff6ff;
  --radius:10px; --radius-sm:6px;
  --mono:"Fira Code",ui-monospace,SFMono-Regular,monospace;
}
@media (prefers-color-scheme:dark){:root:where(:not([data-theme=light])){
  color-scheme:dark;
  --plane:#0f172a; --surface-1:#1e293b; --parchment:#334155; --pearl:#1e293b;
  --text-primary:#f1f5f9; --text-secondary:#cbd5e1; --muted:#94a3b8;
  --grid:#334155; --border:#475569;
  --series-1:#60a5fa; --accent-focus:#93c5fd; --cta:#fb923c; --nav-bg:#0f172a;
  --row-hover:#1e3a5f;
}}
:root[data-theme=dark]{
  color-scheme:dark;
  --plane:#0f172a; --surface-1:#1e293b; --parchment:#334155; --pearl:#1e293b;
  --text-primary:#f1f5f9; --text-secondary:#cbd5e1; --muted:#94a3b8;
  --grid:#334155; --border:#475569;
  --series-1:#60a5fa; --accent-focus:#93c5fd; --cta:#fb923c; --nav-bg:#0f172a;
  --row-hover:#1e3a5f;
}
*{box-sizing:border-box}
body{margin:0;background:var(--plane);color:var(--text-primary);
font-family:"Fira Sans",system-ui,-apple-system,"Segoe UI",sans-serif;
font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
a,button,label,summary{cursor:pointer}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{
transition:none!important;animation:none!important}}
/* ---- topbar (menu horizontal superior) ---- */
.topbar{position:sticky;top:0;z-index:50;background:var(--nav-bg);
border-bottom:1px solid var(--grid)}
.topbar-in{max-width:1160px;margin:0 auto;padding:0 20px;height:52px;
display:flex;align-items:center;gap:20px}
.brand{font-weight:700;font-size:15px;color:var(--text-primary);
text-decoration:none;white-space:nowrap;display:flex;align-items:center;gap:8px}
.brand::before{content:'';width:10px;height:10px;border-radius:3px;background:var(--series-1)}
.brand small{color:var(--muted);font-weight:400;font-size:12px}
.snav{display:flex;gap:2px;overflow-x:auto;flex:1;justify-content:flex-end}
.snav a{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px;
text-decoration:none;color:var(--text-secondary);font-weight:500;font-size:13.5px;
white-space:nowrap;transition:background .15s,color .15s}
.snav a svg{width:15px;height:15px;flex:none;stroke:currentColor;fill:none;stroke-width:2;
stroke-linecap:round;stroke-linejoin:round}
.snav a:hover{color:var(--text-primary);background:var(--parchment)}
.snav a.on{color:var(--series-1);background:color-mix(in srgb,var(--series-1) 12%,transparent)}
.snav a:focus-visible{outline:2px solid var(--accent-focus);outline-offset:2px}
.main{min-width:0}
.wrap{max-width:1160px;margin:0 auto;padding:28px 20px 64px}
.crumb{color:var(--muted);font-size:12px;margin:0 0 4px}
.crumb b{color:var(--text-secondary);font-weight:600}
header h1{margin:0 0 6px;font-size:26px;font-weight:700;line-height:1.2;
letter-spacing:-.01em;text-wrap:balance}
header .sub{color:var(--text-secondary);margin:0 0 6px;font-size:14.5px;max-width:72ch}
@media (max-width:720px){.topbar-in{padding:0 12px;gap:10px}.brand small{display:none}
header h1{font-size:22px}}
/* hero (home de busca) */
.wrap-hero{padding-top:7vh;text-align:center}
.hero h1{font-size:40px;font-weight:700;line-height:1.12;letter-spacing:-.02em;margin:0 0 10px}
.hero .sub{margin:0 auto 8px;max-width:62ch;font-size:16px;color:var(--text-secondary)}
@media (max-width:720px){.hero h1{font-size:28px}}
.wrap-hero .busca{max-width:620px;margin:22px auto 0;display:block;text-align:left}
.wrap-hero #res{text-align:left;max-width:980px;margin:0 auto}
.wrap-hero #res .vazio{text-align:center;margin-top:12px}
.chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}
.chips button{border:1px solid var(--grid);background:var(--surface-1);color:var(--text-secondary);
border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;font-family:inherit;
transition:all .15s;min-height:34px}
.chips button:hover{border-color:var(--series-1);color:var(--series-1);
background:color-mix(in srgb,var(--series-1) 6%,transparent)}
.chips button:focus-visible{outline:2px solid var(--accent-focus);outline-offset:2px}
/* KPI row data-dense */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:20px 0 6px}
.tile{padding:14px 16px;background:var(--surface-1);border:1px solid var(--grid);
border-radius:var(--radius);border-left:3px solid var(--series-1);
transition:box-shadow .15s}
.tile:hover{box-shadow:0 2px 8px rgba(15,23,42,.08)}
.tile-val{font-size:24px;font-weight:600;line-height:1.2;font-family:var(--mono);
font-variant-numeric:tabular-nums}
.tile-lbl{color:var(--text-secondary);font-size:11.5px;margin-top:3px;font-weight:500;
text-transform:uppercase;letter-spacing:.04em}
.tile-sub{color:var(--muted);font-size:11.5px;margin-top:3px}
section{margin-top:26px}
h2{font-size:16px;margin:0 0 2px;font-weight:600}
.sec-desc{color:var(--text-secondary);font-size:13px;margin:0 0 8px}
.card{background:var(--surface-1);border:1px solid var(--grid);border-radius:var(--radius);
padding:16px;overflow-x:auto}
.lbl{fill:var(--text-secondary);font-size:12px}
.val{fill:var(--text-primary);font-size:12px;font-weight:600;font-family:var(--mono)}
.vazio{color:var(--muted);margin:0;font-size:13px}
.donut-wrap{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.donut-num{fill:var(--text-primary);font-size:24px;font-weight:600}
.donut-cap{fill:var(--muted);font-size:11px}
.leg{display:flex;flex-direction:column;gap:5px;min-width:220px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:13px}
.sw{width:11px;height:11px;border-radius:3px;flex:none}
.leg-nome{flex:1}.leg-val{color:var(--text-secondary);font-family:var(--mono);font-size:12px}
footer{margin-top:36px;color:var(--muted);font-size:12px;
border-top:1px solid var(--grid);padding-top:12px}
.pii{background:var(--parchment);border-radius:var(--radius-sm);
padding:10px 14px;font-size:12px;color:var(--text-secondary);margin-top:18px}
.lista{max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.li{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;
padding:7px 6px;border-bottom:1px solid var(--grid);font-size:13px;transition:background .15s}
.li:hover{background:var(--row-hover)}
.li4{grid-template-columns:1fr auto auto auto}
.li-coord{color:var(--text-secondary);font-size:12px;white-space:nowrap}
.li-tit{color:var(--text-primary)}
.li-tipo{color:var(--muted);font-size:11px;border:1px solid var(--grid);
border-radius:6px;padding:1px 8px;font-weight:500}
.li-proc{color:var(--muted);font-family:var(--mono);font-size:11.5px}
.net-lbl{fill:var(--text-secondary);font-size:11px;font-weight:600}
.explica{margin-top:10px;border-top:1px solid var(--grid);padding-top:8px}
.explica summary{color:var(--series-1);font-size:13px;font-weight:500}
.explica summary:focus-visible{outline:2px solid var(--accent-focus);outline-offset:2px}
.explica p{color:var(--text-secondary);font-size:13px;margin:8px 0 0;max-width:72ch}
.nota{background:color-mix(in srgb,var(--cta) 10%,var(--surface-1));color:var(--text-primary);
border-left:3px solid var(--cta);border-radius:var(--radius-sm);
padding:10px 14px;font-size:13px;font-weight:500;margin:14px 0}
/* abas: segmented compacto */
.tabs>input{position:absolute;opacity:0;pointer-events:none}
.tabbar{display:inline-flex;gap:2px;margin:18px 0 4px;flex-wrap:wrap;
background:var(--parchment);border-radius:9px;padding:3px}
.tabbar label{padding:7px 14px;border-radius:7px;font-weight:500;font-size:13px;
color:var(--text-secondary);transition:all .15s;min-height:32px;display:flex;align-items:center}
.tabbar label:hover{color:var(--text-primary)}
#tab1:checked~.tabbar label[for=tab1],
#tab2:checked~.tabbar label[for=tab2],
#tab3:checked~.tabbar label[for=tab3],
#tab4:checked~.tabbar label[for=tab4],
#tab5:checked~.tabbar label[for=tab5]{background:var(--surface-1);color:var(--series-1);
font-weight:600;box-shadow:0 1px 3px rgba(15,23,42,.12)}
.tabs>input:focus-visible~.tabbar label{outline:2px solid var(--accent-focus)}
.panel{display:none}
#tab1:checked~.p1{display:block}
#tab2:checked~.p2{display:block}
#tab3:checked~.p3{display:block}
#tab4:checked~.p4{display:block}
#tab5:checked~.p5{display:block}

table.tb{width:100%;border-collapse:collapse;font-size:13px}
table.tb th{color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);
font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
position:sticky;top:0;background:var(--surface-1)}
table.tb td{padding:8px 10px;border-bottom:1px solid var(--grid);vertical-align:top}
table.tb tr:last-child td{border-bottom:0}
table.tb tbody tr{transition:background .15s}
table.tb tbody tr:hover{background:var(--row-hover)}
a.lk{color:var(--series-1);text-decoration:none;font-weight:500}
a.lk:hover{text-decoration:underline}
a.lk:focus-visible{outline:2px solid var(--accent-focus);outline-offset:2px}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px;margin:14px 0}
.meta div{background:var(--surface-1);border:1px solid var(--grid);border-radius:var(--radius);
padding:11px 14px;font-size:13px}
.meta b{display:block;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.05em;
text-transform:uppercase;margin-bottom:3px}
.resumo{background:var(--surface-1);border:1px solid var(--grid);
border-left:3px solid var(--series-1);border-radius:var(--radius);padding:24px 28px;
color:var(--text-primary);max-width:none;min-height:120px;line-height:1.7;font-size:16px}
input.busca{width:100%;padding:12px 18px;border-radius:var(--radius);border:1px solid var(--border);
background:var(--surface-1);color:var(--text-primary);font-size:15px;
outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s;min-height:46px}
input.busca:focus{border-color:var(--series-1);
box-shadow:0 0 0 3px color-mix(in srgb,var(--series-1) 20%,transparent)}
.badge{display:inline-block;border:1px solid var(--grid);border-radius:6px;padding:3px 10px;
font-size:11.5px;font-weight:500;color:var(--text-secondary);white-space:nowrap;
background:var(--surface-1)}
.tl-t{fill:var(--text-primary);font-size:14px;font-weight:600}
.tl-s{fill:var(--muted);font-size:12px}

va", "cs": "emmanuel-marques-silva", "tp": "Curso", "ano": "2017", "n": 84, "b": "Curso de Pré-Incubação para Empreendedores – Modalidade Competências Empreendedora Emmanuel Marques Silva Curso Extensão Tecnologia e Produção Ciências Sociais Aplicadas SEM VÍNCULO 23158.000370/2017-13 Objetivo: Capacitar empreendedores com conhecimentos básicos da área de Gestão Empresarial com vistas a desenvolver e fortalecer características de comportamento empreendedor. O curso tem como foco principal o desenvolvimento de propostas de empreendimentos que possuam aderência a uma ou mais áreas de atuação do Ifes Campus Serra, que são: a) Tecnologia da Informação e da Comunicação (TIC); b) Inf"}, {"id": "1263", "t": "Ciclo de estudos 2017/2 do Ifes campus Serra", "c": "Gilmar Luiz Vassoler", "cs": "gilmar-luiz-vassoler", "tp": "Evento", "ano": "2017", "n": 142, "b": "Ciclo de estudos 2017/2 do Ifes campus Serra Gilmar Luiz Vassoler Evento Desenv. Institucional Educação  SEM VÍNCULO 23158.000394/2017-64 Ciclo de estudos"}, {"id": "1406", "t": "Curso de Pré-Incubação de Empreendimentos – modalidade Residência", "c": "Felipe Frechiani de Oliveira", "cs": "felipe-frechiani-de-oliveira", "tp": "Curso", "ano": "2017", "n": 12, "b": "Curso de Pré-Incubação de Empreendimentos – modalidade Residência Felipe Frechiani de Oliveira Curso Extensão Tecnologia e Produção Ciências Sociais Aplicadas SEM VÍNCULO 23158.001300/2017-74 O Curso de Pré-Incubação de Empreendimentos – modalidade Residência surge com o intuito de oferecer um conjunto de atividades tais como capacitação, assessorias, orientações nas áreas de gestão e tecnológica, além de infraestrutura, de forma a apoiar novos empreendedores no desenvolvimento de ideias com posterior geração de produtos, processos ou modelo de negócio com vistas à transformá-los em um"}, {"id": "1426", "t": "Semana de Ciência e Tecnologia do Campus Serra do Ifes", "c": "Gilmar Luiz Vassoler", "cs": "gilmar-luiz-vassoler", "tp": "Evento", "ano": "2017", "n": 0, "b": "Semana de Ciência e Tecnologia do Campus Serra do Ifes Gilmar Luiz Vassoler Evento Extensão Tecnologia e Produção Engenharias SEM VÍNCULO 23158.001525/2017-21 Ao longo dos anos o Campus foi implantando cursos de excelência nestas áreas e hoje oferta para a comunidade os cursos: técnico integrado em informática para internet, técnico integrado em mecatrônica, técnico em informática, técnico em automação industrial, bacharelado em sistemas de informação, engenharia de controle e automação e mestrado profissional em engenharia de controle de automação. O i"}, {"id": "1546", "t": "Ifes para todos", "c": "Alessandro Bermudes Gomes", "cs": "alessandro-bermudes-gomes", "tp": "Programa", "ano": "2018", "n": 18, "b": "Ifes para todos Alessandro Bermudes Gomes Programa Extensão Educação Ciências Humanas SEM VÍNCULO 23158.001812/2017-31 A preocupação com o acesso e a permanência nas instituições federais de ensino profissional e tecnológico vem historicamente de uma condição assistencialista aos meninos sem família ou com família em condições financeiras e sociais precárias. Basta, para isso, voltar os olhos à história em andamento do próprio Instituto Federal no Espírito Santo.\nA preocupação com que as ações realizadas não sejam"}, {"id": "1591", "t": "OFICINA  DE FÍSICA", "c": "Giovani Zanetti Neto", "cs": "giovani-zanetti-neto", "tp": "Projeto", "ano": "2018", "n": 0, "b": "OFICINA  DE FÍSICA Giovani Zanetti Neto Projeto Ensino Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.000181/2018-13 O projeto “Oficina de Física” contempla o desenvolvimento de estratégias de ensino e avaliação para o ensino de ciências a partir do desenvolvimento, aplicação e validação de atividades práticas. Tendo por meta final o contexto escolar, pretende-se, a partir da materialidade da ação e da reflexão sobre a prática, superar a disjunção teoria versus prática no ensino de ciências em busca de uma efeti"}, {"id": "1592", "t": "Tutoria em Estudos Avançados", "c": "Fabio de Oliveira Lima", "cs": "fabio-de-oliveira-lima", "tp": "Projeto", "ano": "2018", "n": 0, "b": "Tutoria em Estudos Avançados Fabio de Oliveira Lima Projeto Ensino Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.000173/2018-77 Oferecer aos alunos do ensino médio ou graduação, que se interessarem em se aprofundar no estudo de  conteúdos e técnicas que vão além do exigido em sala de aula."}, {"id": "1597", "t": "Oficina de Crochê Tramando", "c": "Alessandra Aguiar Vilarinho", "cs": "alessandra-aguiar-vilarinho", "tp": "Curso", "ano": "2018", "n": 11, "b": "Oficina de Crochê Tramando Alessandra Aguiar Vilarinho Curso Ensino Cultura Linguística, Letras e Artes SEM VÍNCULO 23158.000107/2018-05 Tramando é uma o oficina de crochê(*) ou croché (em francês crochet) com periodicidade semanal aberta a toda comunidade Ifes e a toda comunidade externa, onde a técnica do crochê será ensinada aos inexperientes e desenvolvida para os já experientes, com a apresentação de novos usos do crochê com materiais alternativos.\nO objetivo desta oficina é usar a arte do crochê para proporcionar aos pratican"}, {"id": "1602", "t": "Coral Musicante", "c": "Ricardo Ramos Costa", "cs": null, "tp": "Projeto", "ano": "2018", "n": 16, "b": "Coral Musicante Ricardo Ramos Costa Projeto Ensino Cultura Linguística, Letras e Artes SEM VÍNCULO 23158.000122/2018-45 O projeto Coral Musicante tem como objetivo principal oferecer aos alunos do Ifes Campus Serra interação, aprendizagem e aprofundamento sobre música por meio da atividade de canto coral. A proposta visa desenvolver e ampliar as experiências estéticas e musicais em nossa escola através de ensaios, preparação de repertório e apresentações musicais internas e externas."}, {"id": "1604", "t": "Improving your English", "c": "Giordana dos Santos Sperandio", "cs": "giordana-dos-santos-sperandio", "tp": "Projeto", "ano": "2018", "n": 0, "b": "Improving your English Giordana dos Santos Sperandio Projeto Ensino Educação Linguística, Letras e Artes SEM VÍNCULO 23158.000147/2018-49 Sabemos que a Língua Inglesa é um dos maiores instrumentos de acesso a informação e culturas.  No meio acadêmico, as fontes de pesquisas são apresentadas, em sua maioria, em Inglês. Por isso, e atendendo a demanda dos alunos dos cursos superiores do Campus, este projeto visa proporcionar aos estudantes oportunidade de aperfeiçoar e aprofundar suas competências de Listening, Speaking, Reading e Wri"}, {"id": "1613", "t": "BoardGames: Divirta-se Estimulando Sua Mente", "c": "Flavio Severiano Lamas de Souza", "cs": "flavio-severiano-lamas-de-souza", "tp": "Projeto", "ano": "2018", "n": 11, "b": "BoardGames: Divirta-se Estimulando Sua Mente Flavio Severiano Lamas de Souza Projeto Ensino Educação Linguística, Letras e Artes SEM VÍNCULO 23158.000186/2018-46 Oferecer ambientes lúdicos que estimulem os alunos a desenvolverem táticas, estratégias, novas formas de pensamento que os mantenham na instituição e dêem ainda mais valor a mesma. \n\nO estímulo proporcionado por jogos que demandem raciocínio lógico, controle de área, gestão de recursos limitados e/ou outras habilidades inerentes de cada tipo de temática lúdica é de extremo valor tanto na vida acad"}, {"id": "1614", "t": "Treinamento em Mikrotik 2018-1", "c": "Celio Proliciano Maioli", "cs": "celio-proliciano-maioli", "tp": "Projeto", "ano": "2018", "n": 24, "b": "Treinamento em Mikrotik 2018-1 Celio Proliciano Maioli Projeto Ensino Tecnologia e Produção Linguística, Letras e Artes SEM VÍNCULO 23158.000154/2018-41 O treinamento introdutório ao Roteador Mikrotik, da empresa de mesmo nome, visa proporcionar aos alunos a imersão em um produto em uso no mercado com importantes características técnicas, e utilização, profissional tanto nacional quanto internacionalmente.\nEmbora os cursos técnicos e superiores do Campus invistam na formação sólida de seus estudantes através da integração de conceitos com ferramen"}, {"id": "1633", "t": "Mulheres na Ciência", "c": "Giordana dos Santos Sperandio", "cs": "giordana-dos-santos-sperandio", "tp": "Projeto", "ano": "2018", "n": 21, "b": "Mulheres na Ciência Giordana dos Santos Sperandio Projeto Extensão Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.000199/2018-15 O projeto “Mulheres na Ciência” motivou-se da percepção dos baixos índices percentuais de mulheres nos cursos de Ciências Exatas, em especial no Campus Serra, onde apenas 57 alunas - de um total de 298 - estão matriculadas no curso de Bacharelado em Sistemas de Informação. Ou seja, apenas 19,2% são mulheres (Dados de 2017). E, de acordo com a Unesco, esse índice representa uma problemática mundial"}, {"id": "1648", "t": "Projeto Expedição IFES – Conhecendo o Brasil", "c": "Alessandro Bermudes Gomes", "cs": "alessandro-bermudes-gomes", "tp": "Projeto", "ano": "2018", "n": 0, "b": "Projeto Expedição IFES – Conhecendo o Brasil Alessandro Bermudes Gomes Projeto Ensino Cultura Ciências Humanas SEM VÍNCULO 23158.000225/2018-13 Considerando as necessidades educacionais de estudo do meio, a excursão pedagógica que contempla as cidades históricas mineiras visa ressaltar os aspectos escolares relacionados a essas localidades. Além do evidente interesse turístico, a atenção principal das visitas se concentra nos monumentos históricos que registram a saga da descoberta do ouro no Brasil - Colônia, que possibilitou o florescim"}, {"id": "1652", "t": "Livro do Ano", "c": "Wagner Kirmse Caldas", "cs": "wagner-kirmse-caldas", "tp": "Projeto", "ano": "2018", "n": 0, "b": "Livro do Ano Wagner Kirmse Caldas Projeto Ensino Cultura Linguística, Letras e Artes SEM VÍNCULO 23158.000217/2018-69 O ato de estudar é algo tão intrínseco à nossa sociedade que, muitas vezes, deixamos dar-lhe o devido valor. As vezes passamos anos estudando juntos e esquecemo-nos de deixar registrados os momentos que marcaram nossa passagem por determinada etapa de nossas vidas. Os anuários são uma forma de realizar a catalogação dessas etapas"}, {"id": "1702", "t": "Ifes Portas Abertas", "c": "Wagner Kirmse Caldas", "cs": "wagner-kirmse-caldas", "tp": "Projeto", "ano": "2018", "n": 387, "b": "Ifes Portas Abertas Wagner Kirmse Caldas Projeto Extensão Educação  SEM VÍNCULO 23158.000218/2018-11 O Campus Serra é um centro de excelência do Instituto Federal do Espírito Santo, no município de Serra, e oferece cursos em diversas modalidades, desde o ensino técnico integrado, Proeja, cursos concomitantes, superiores, mestrado e cursos de extensão, entretanto, por esse município ser muito extenso, o Instituto não é tão conhecido, e essa realidade estende-se à Grande Vitória. O projeto “Ifes Po"}, {"id": "1786", "t": "Mutual Life: Um aplicativo para seguros colaborativos", "c": "Paulo Sérgio dos Santos Júnior", "cs": "paulo-sergio-dos-santos-junior", "tp": "Projeto", "ano": "2018", "n": 4, "b": "Mutual Life: Um aplicativo para seguros colaborativos Paulo Sérgio dos Santos Júnior Projeto Extensão Educação Ciências Sociais Aplicadas SEM VÍNCULO 23158.001579/2017-96 O projeto tem como objetivo auxiliar no desenvolvimento da plataforma de seguros colaborativos e cooperativos Mutual.Life. A ideia presente no projeto é resgatar o mutualismo de forma segura e transparente, proporcionando, portanto, uma relação mais simétrica e justa para os participantes, mas também eliminando os riscos de má gestão, fraudes e outros problemas historicamente frequentes nas associ"}, {"id": "1795", "t": "ESPM-Empregos: Um serviço inteligente para promover a empregabilidade", "c": "Moisés Savedra Omena", "cs": "moises-savedra-omena", "tp": "Projeto", "ano": "2018", "n": 7, "b": "ESPM-Empregos: Um serviço inteligente para promover a empregabilidade Moisés Savedra Omena Projeto Extensão Tecnologia e Produção Ciências Sociais Aplicadas SEM VÍNCULO 23158.000386/2018-07 A presente ação tem como objetivo desenvolver um serviço inteligente que auxilie o governo do estado do Espírito Santo na gestão de ações que envolvam o aumento da empregabilidade e diminuição do desemprego. São atribuições desse serviço: (i) sugestão de vaga de emprego conforme o perfil do candidato e (ii) sugestão de vagas em cursos de formação. \n\nPara atingir o objetivo supracitado, será realiz"}, {"id": "1816", "t": "Maratona de Programação", "c": "Flavio Severiano Lamas de Souza", "cs": "flavio-severiano-lamas-de-souza", "tp": "Evento", "ano": "2018", "n": 49, "b": "Maratona de Programação Flavio Severiano Lamas de Souza Evento Extensão Tecnologia e Produção Ciências Exatas e da Terra SEM VÍNCULO 23158.000452/2018-31 A Maratona de Programação é um evento da Sociedade Brasileira de Computação que existe desde o ano de 1996. A Maratona nasceu das competições regionais classificatórias para as finais mundiais do concurso de programação da ACM, o ACM International Collegiate Programming Contest, e é parte da regional sulamericana do concurso. Neste ano ocorre a 20ª edição da Maratona.\n\nEla se destina a alunos de c"}, {"id": "1818", "t": "Academia Cisco nas Escolas Municipais da Serra - ES", "c": "Gilberto Neves Sudre Filho", "cs": "gilberto-neves-sudre-filho", "tp": "Projeto", "ano": "2018", "n": 46, "b": "Academia Cisco nas Escolas Municipais da Serra - ES Gilberto Neves Sudre Filho Projeto Extensão Tecnologia e Produção Ciências Exatas e da Terra SEM VÍNCULO 23158.000258/2018-55 O projeto consiste na capacitação de professores das escolas municipais da Serra – ES para que estes possam ministrar os cursos oferecidos pela Academia Cisco. \n\nCom a capacitação dos professores será possível oferecer cursos em áreas de Empreendedorismo, Programação de Computadores, Redes de Computadores e Segurança da Informação aos alunos das escolas municipais. \n\nO mercado de Tecnologia da Inf"}, {"id": "1829", "t": "Desenvolvimento de um sistema multiplataforma para robôs de assistência e manutenção de qu", "c": "Richard Junior Manuel Godinez Tello", "cs": "richard-junior-manuel-godinez-tello", "tp": "Projeto", "ano": "2018", "n": 3, "b": "Desenvolvimento de um sistema multiplataforma para robôs de assistência e manutenção de quadras esportivas Richard Junior Manuel Godinez Tello Projeto Extensão Tecnologia e Produção Engenharias PAEX-IFES 23158.000341/2017-43 Este projeto visa o desenvolvimento de uma plataforma robótica que possa auxiliar na manutenção de campos esportivos de futebol. Assim, este robô poderá realizar tarefas, como por exemplo, corte do gramado e pintado das linhas regulamentares. O sistema utilizará programação de microcontroladores e estratégias de navegação. O sistema pretende ser bastante intuitivo para um usuário e flexível para a"}, {"id": "1831", "t": "ALGolfSwing: Análise de Desempenho Esportivo para Golf", "c": "Daniel Ribeiro Trindade", "cs": "daniel-ribeiro-trindade", "tp": "Projeto", "ano": "2018", "n": 2, "b": "ALGolfSwing: Análise de Desempenho Esportivo para Golf Daniel Ribeiro Trindade Projeto Extensão Tecnologia e Produção Ciências Exatas e da Terra SEM VÍNCULO 23158.000342/2017-98 O objetivo é a criação de uma ferramenta para análise de desempenho esportivo para golf. Especificamente a ferramenta fará uma análise do movimento de golf chamado swing, sendo este o movimento realizado pelo jogador imediatamente antes da batida na bola. Para a criação da ferramenta de análise serão estudados os aspectos mecânicos e de postura para a melhor realização possível do movimento. Esses"}, {"id": "1834", "t": "Sistema para predição de transtornos mentais comuns na atenção primária a saúde", "c": "Moisés Savedra Omena", "cs": "moises-savedra-omena", "tp": "Projeto", "ano": "2018", "n": 5, "b": "Sistema para predição de transtornos mentais comuns na atenção primária a saúde Moisés Savedra Omena Projeto Extensão Tecnologia e Produção Ciências da Saúde PAEX-IFES 23158.000317/2018-95 O presente projeto partiu de necessidades verificadas com os profissionais das áreas de saúde de Vitória verificadas em projetos anteriores realizados pelos professores parceiros da UFES. O projeto atual pretende utilizar uma base de dados já coletada e anonimizada por projetos anteriores da instituição parceira, a UFES. A intenção é fazer uma prova de conceito, para posteriormente auxiliar a toma"}, {"id": "1838", "t": "LEDS – Laboratório de Extensão e Desenvolvimento de Soluções", "c": "Felipe Frechiani de Oliveira", "cs": "felipe-frechiani-de-oliveira", "tp": "Programa", "ano": "2018", "n": 4, "b": "LEDS – Laboratório de Extensão e Desenvolvimento de Soluções Felipe Frechiani de Oliveira Programa Extensão Educação Engenharias PAEX-IFES 23158.000318/2018-30 O programa Leds cria é um ambiente que simula o dia-a-dia empresarial. Nesse ambiente alunos se beneficiam da experiência profissional de servidores e parceiros que orientam o desenvolvimento de produtos, processos e serviços, para a sociedade.\nEsse ambiente propicia um aprendizado vivencial para alunos e servidores por meio da cooperação mútua. Além disso, o Leds proporciona um ambiente prático e"}, {"id": "1847", "t": "Sistema de apoio para rastreio e geolocalização de transtornos mentais comuns na atenção p", "c": "Carlos Lins Borges Azevedo", "cs": "carlos-lins-borges-azevedo", "tp": "Projeto", "ano": "2018", "n": 5, "b": "Sistema de apoio para rastreio e geolocalização de transtornos mentais comuns na atenção primária a saúde Carlos Lins Borges Azevedo Projeto Extensão Tecnologia e Produção Ciências da Saúde SEM VÍNCULO 23158.000316/2018-41 O presente projeto partiu de necessidades das Unidades Básicas de Saúde de Vitória verificadas em projetos anteriores realizados pelos professores parceiros da UFES. Este projeto será realizado em paralelo com o projeto “Sistema para predição de transtornos mentais comuns na atenção primária a saúde” e com o projeto “Identificação de Transtornos Mentais Comuns e Abuso De Álcool/Drogas no Âmbito Da"}, {"id": "1883", "t": "Inova Serra", "c": "Francisco José Casarim Rapchan", "cs": "francisco-jose-casarim-rapchan", "tp": "Programa", "ano": "2018", "n": 6, "b": "Inova Serra Francisco José Casarim Rapchan Programa Extensão Tecnologia e ilitar a esses alunos uma revisão dos conteúdos trabalhados em suas respectivas escolas. Destarte, esperam"}, {"id": "2082", "t": "Mulheres na Ciência", "c": "Giordana dos Santos Sperandio", "cs": "giordana-dos-santos-sperandio", "tp": "Curso", "ano": "2018", "n": 53, "b": "Mulheres na Ciência Giordana dos Santos Sperandio Curso Extensão Tecnologia e Produção Ciências Exatas e da Terra SEM VÍNCULO 23158.001039/2018-93 O objetivo deste curso é promover, à jovens mulheres, uma visão do mundo tecnológico e científico, possibilitando a participação plena das mulheres, rompendo com barreiras e injustiças históricas no mundo científico bem como fomentar o empoderamento feminino. Intencionando ampliar suas condições e perspectivas de vida, este curso contará com a participação de 18 alunas de 2 escolas públicas estadu"}, {"id": "2107", "t": "Ifes Portas Abertas", "c": "Wagner Kirmse Caldas", "cs": "wagner-kirmse-caldas", "tp": "Programa", "ano": "2018", "n": 547, "b": "Ifes Portas Abertas Wagner Kirmse Caldas Programa Extensão Educação  SEM VÍNCULO 23158.001172/2018-40 O programa “Ifes Portas Abertas” é uma evolução do projeto “Ifes Portas Abertas”, o qual foi realizado durante o ano de 2018, atendendo mais de vinte escolas e mais de 400 alunos. Esse programa tem por objetivo receber a visita de alunos da rede pública e privada, a princípio aqueles cursando os oitavos e nonos anos do ensino fundamental e os alunos do ensino médio, para que eles possam conhecer o"}, {"id": "2193", "t": "LifeBox: transporte e monitoramento de córnea de forma inteligente", "c": "Carlos Lins Borges Azevedo", "cs": "carlos-lins-borges-azevedo", "tp": "Projeto", "ano": "2019", "n": 8, "b": "LifeBox: transporte e monitoramento de córnea de forma inteligente Carlos Lins Borges Azevedo Projeto Extensão Tecnologia e Produção Ciências Exatas e da Terra SEM VÍNCULO 23158.000424/2016-51 Melhorar o processo de notificação, capacitação e distribuição de córneas do estado do Espírito Santo, diminuindo a f ão Pedagógica: Didática e Técnicas de Ensino. Bruno Ramos Gonzaga Curso Extensão Educação Ciências Humanas SEM VÍNCULO 23158.001963/2019-05 O curso “Ambientação Pedagógica: Didática e Técnicas de Ensino” tem por objetivo capacitar, por meio\nde um conjunto de conhecimentos pedagógicos elementares de didática e técnicas de\nensino/aprendizado, (i) estudantes dos cursos técnicos e de graduação do campus, (ii) estudantes das\ninstituições parceiras do projeto, e (iii) demais profissionais da área da educação. A metodologia de\nensino envolve"}, {"id": "2783", "t": "Informática Básica Para Agentes Multiplicadores.", "c": "Bruno Cardoso Coutinho", "cs": "bruno-cardoso-coutinho", "tp": "Curso", "ano": "2019", "n": 42, "b": "Informática Básica Para Agentes Multiplicadores. Bruno Cardoso Coutinho Curso Extensão Educação Ciências Sociais Aplicadas SEM VÍNCULO 23158.001983/2019-47 Tendo em vista a grande diversidade de conhecimentos tecnológicos, de natureza dinâmica e evolutiva ,juntamente\ncom a necessidade de incluir todos neste mundo digital e visando o compartilhamento igualitário de oportunidades\nno mercado de trabalho, torna-se cada vez mais necessária a realização de ações de inclusão digital, social e\nimplementação de tecnologias sociais em comunidades vulneráveis. "}, {"id": "2786", "t": "My Pay: Um ERP em nuvem para foodtrucks", "c": "Felipe Frechiani de Oliveira", "cs": "felipe-frechiani-de-oliveira", "tp": "Projeto", "ano": "2019", "n": 0, "b": "My Pay: Um ERP em nuvem para foodtrucks Felipe Frechiani de Oliveira Projeto Extensão Tecnologia e Produção Engenharias SEM VÍNCULO 23158.002323/2019-82 Atualmente, no mercado, existem muitos estabelecimentos comerciais do tipo foodtruck. Tais\nestabelecimentos carecem de controle financeiro, operacional e gerencial de suas vendas. Essa falta\nde controle gera perda de vendas, conflitos durante o atendimento na parte operacional e com o\ncliente. Além desses problemas mencionados, pode-se citar ainda a falta de uma visão geral para o\nproprietário sob"}, {"id": "2799", "t": "I Encontro Cultural do Núcleo de Estudos Afro-Brasileiros e Indígenas : Debates e reflexõe", "c": "Diego Ramiro Araoz Alves", "cs": "diego-ramiro-araoz-alves", "tp": "Evento", "ano": "2019", "n": 0, "b": "I Encontro Cultural do Núcleo de Estudos Afro-Brasileiros e Indígenas : Debates e reflexões no Dia da Consciência Negra Diego Ramiro Araoz Alves Evento Ensino Educação Linguística, Letras e Artes SEM VÍNCULO 23158.002392/2019-62 Ação de complementação de ensino que visa promover uma reflexão crítica sobre a celebração do dia da consciência negra, sobre racismo e a educação para as relações étnico-raciais, com foco em atividades culturais, rodas de conversa e o incentivo ao protagonismo estudantil."}, {"id": "2823", "t": "I Am Here: Registro de Frequência por Reconhecimento Facial", "c": "Fabiano Borges Ruy", "cs": "fabiano-borges-ruy", "tp": "Projeto", "ano": "2019", "n": 6, "b": "I Am Here: Registro de Frequência por Reconhecimento Facial Fabiano Borges Ruy Projeto Extensão Tecnologia e Produção Ciências Exatas e da Terra SEM VÍNCULO 23158.001152/2019-50 O registro de frequência durante as aulas é uma atividade necessária porém repetitiva e custosa\n(especialmente em turmas grandes). Em cada aula de 100 minutos, esta atividade pode tomar cerca de\n5% do tempo de aula. Dessa forma, poderia ser (semi)automatizada. O objetivo deste projeto é o\ndesenvolvimento de uma aplicação capaz de contabilizar a frequência de alunos por meio de um\naplicativo utiliz"}, {"id": "2836", "t": "II Vivências de Queimado", "c": "Diego Ramiro Araoz Alves", "cs": "diego-ramiro-araoz-alves", "tp": "Evento", "ano": "2019", "n": 0, "b": "II Vivências de Queimado Diego Ramiro Araoz Alves Evento Pesquisa Cultura Ciências Humanas SEM VÍNCULO 23158.002614/2019-82 O primeiro encontro Vivências de Queimado aconteceu no dia 05 de outubro de 2019, como um\ndesdobramento do projeto de pesquisa \"Levantamento das referências culturais de São Jo a “Levantamento das referências culturais de São José do Queimado, Serra/ES”, para os movimentos sociais,\no Iphan, estudantes e demais interessados a temática.\nDiante do sucesso do primeiro seminário e buscando dar con"}, {"id": "2931", "t": "Tutoria de Estudos Orientados: Compartilhando Saberes", "c": "Bruno Ramos Gonzaga", "cs": "bruno-ramos-gonzaga", "tp": "Projeto", "ano": "2020", "n": 0, "b": "Tutoria de Estudos Orientados: Compartilhando Saberes Bruno Ramos Gonzaga Projeto Extensão Educação Ciências Humanas SEM VÍNCULO 23158.000470/2020-58 No dia 10 de dezembro do ano de 2014, foi lançado, por nós, no Ifes, o Projeto Tutoria Em Estudos\nOrientados, que, desde então, vem acontecendo de forma ininterrupta em todos os semestres letivos, a\nintenção é ampliar e aprimorar o projeto conferindo-lhe uma conceptualização teórica mais consistente,\ntendo com base, várias teorias da aprendizagem, entre elas, a Zona de Desenvolvimento Proximal de\n"}, {"id": "2932", "t": "Física ao Alcance de Todos", "c": "Rosilene de Sá Ribeiro", "cs": "rosilene-de-sa-ribeiro", "tp": "Projeto", "ano": "2020", "n": 10, "b": "Física ao Alcance de Todos Rosilene de Sá Ribeiro Projeto Extensão Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.000471/2020-31 Neste projeto iremos montar e organizar a sala 911T localizada no Campus Serra do Ifes com o objetivo de\ncriarmos um espaço não formal de ensino e aprendizagem. Este espaço será inaugurado no decorrer do\nprimeiro semestre de 2020 e contará com vários experimentos de diversas áreas, principalmente de física,\nsendo a maioria dos experimentos automatizados. Este espaço estará aberto para visitações o"}, {"id": "3021", "t": "Stone Connection", "c": "Moisés Savedra Omena", "cs": "moises-savedra-omena", "tp": "Projeto", "ano": "2020", "n": 7, "b": "Stone Connection Moisés Savedra Omena Projeto Extensão Tecnologia e Produção Engenharias SEM VÍNCULO 23158.001241/2020-96 O Espírito Santo é hoje o líder no mercado de rochas ornamentais bra lvimento de novas soluções/projetos utilizando a plataforma Arduino em várias situações, seja acadêmicas ou até mesmo sociais."}, {"id": "3422", "t": "LEDS – Laboratório de Extensão em Desenvolvimento de Soluções", "c": "Victorio Albani de Carvalho", "cs": "victorio-albani-de-carvalho", "tp": "Programa", "ano": "2021", "n": 1, "b": "LEDS – Laboratório de Extensão em Desenvolvimento de Soluções Victorio Albani de Carvalho Programa Extensão Educação Engenharias SEM VÍNCULO 23158.001821/2021-50 O programa Laboratório de Extensão em Desenvolvimento de Soluções (LEDS) cria dentro do\nIFES campus Serra um ambiente que disponibiliza a alunos, professores, servidores e parceiros\nexternos a participarem de um ou mais projetos. Nesse ambiente, os alunos se beneficiam da\nexperiência profissional de servidores e parceiros que orientam o desenvolvimento de produtos,\nprocessos e serviços, para a soc"}, {"id": "3423", "t": "Programa Local Núcleo Incubador Campus Serra – NIS", "c": "Francisco José Casarim Rapchan", "cs": "francisco-jose-casarim-rapchan", "tp": "Programa", "ano": "2021", "n": 189, "b": "Programa Local Núcleo Incubador Campus Serra – NIS Francisco José Casarim Rapchan Programa Extensão Tecnologia e Produção Ciências Sociais Aplicadas PAEX-IFES 23158.001977/2021-09 A Incubadora do Ifes é concebida como um ambiente educacional propício para o\ndesenvolvimento de competências (conhecimentos, habilidades e atitudes) empreendedoras\ne inovadoras por meio de atividades que contemplam alunos, servidores e comunidade\nexterna. Busca contribuir para o desenvolvimento socioeconômico local e regional sendo\nreferência no trabalho de apoio a empreendimentos inovadores do E"}, {"id": "3431", "t": "Lampex + empreendedor", "c": "Bruno Cardoso Coutinho", "cs": "bruno-cardoso-coutinho", "tp": "Projeto", "ano": "2021", "n": 14, "b": "Lampex + empreendedor Bruno Cardoso Coutinho Projeto Extensão Educação Engenharias SEM VÍNCULO 23158.002189/2021-08 O projeto “Lampex + empreendedor” , o presente"}, {"id": "4507", "t": "Solução web/mobile baseada em Inteligência Computacional para identificação de infestação ", "c": "Fidelis Zanetti de Castro", "cs": "fidelis-zanetti-de-castro", "tp": "Projeto", "ano": "2023", "n": 0, "b": "Solução web/mobile baseada em Inteligência Computacional para identificação de infestação por ácaros rajados (Tetranychus urticae) em culturas de morango Fidelis Zanetti de Castro Projeto Extensão Tecnologia e Produção Ciências Agrárias SEM VÍNCULO 23158.001802/2023-43 No estado do Espírito Santo, o morango é uma das frutas de maior importância socioeconômica. Seu\ncultivo é feito, predominantemente, em propriedades de base familiar situadas em terras frias. Sua cultura\ncontribui para a fixação de inúmeras famílias em zonas rurais e proporciona alto retorno econômico em\nciclos produtivos curtos, os quais variam de 60 a 90 dias. O ácaro rajado (Tetranychus urticae"}, {"id": "451", "t": "Tutoria de Estudos Orientados em Matemática Nº 01/2014", "c": "Bruno Ramos Gonzaga", "cs": "bruno-ramos-gonzaga", "tp": "Curso", "ano": "2015", "n": 38, "b": "Tutoria de Estudos Orientados em Matemática Nº 01/2014 Bruno Ramos Gonzaga Curso Extensão Educação Ciências Exatas e da Terra PAEX-IFES 23158.001171/2014-71 Analisando os índices de retenção em disciplinas dos primeiros períodos acadêmicos dos cursos de Bacharelado em Sistemas de Informação e Engenharia de Controle e Automação do Instituto Federal do Espírito Santo (Campus Serra), têm-se observado que, ao longo dos anos tem havido um grande crescimento, comportamento este que tem gerado uma grande preocupação por parte da equipe pedagógica, levando-se"}, {"id": "454", "t": "Seminário dos Grupos de Pesquisa do Campus Serra", "c": "Cristina Klippel Dominicini", "cs": null, "tp": "Evento", "ano": "2015", "n": 115, "b": "Seminário dos Grupos de Pesquisa do Campus Serra Cristina Klippel Dominicini Evento Ensino Educação  SEM VÍNCULO 23158.000402/2015-19 A Diretoria de Pesquisa, Pós-Graduação e Extensão realizará no dia 4 de maio (segunda-feira), no auditório do Campus, das 14h às 17h, o Seminário dos Grupos de Pesquisa do campus Serra. O evento tem o objetivo de expor, difundir e discutir os trabalhos de pesquisa dos grupos e contará com apresentações da Coordenação de Pesquisa e de todos os grupos de pesquisa do Campus.\n\nO seminário é destinado "}, {"id": "4564", "t": "MONITORIA", "c": "Wagner Kirmse Caldas", "cs": "wagner-kirmse-caldas", "tp": "Projeto", "ano": "2023", "n": 37, "b": "MONITORIA Wagner Kirmse Caldas Projeto Ensino Tecnologia e Produção Engenharias SEM VÍNCULO 23158.001565/2023-11 O projeto Monitoria é uma ação que visa incentivar a participação dos alunos no \nprocesso de aprendizagem de seus pares, por meio do atendimento individual ou em grupo, em \nhorários previamente definidos para esse fim. Sendo, também, introduzidos à prática docente, tanto \nno ensino, quanto na participação do planejamento das atividades de monitoria em conjunto com o \nprofessor-orientador."}, {"id": "4589", "t": "Materiais Rodantes Ferroviários", "c": "Vinícius Secchin de Melo", "cs": null, "tp": "Curso", "ano": "2023", "n": 17, "b": "Materiais Rodantes Ferroviários Vinícius Secchin de Melo Curso Ensino Tecnologia e Produção Engenharias SEM VÍNCULO 23158.001853/2023-75 No proposto curso serão apresentados os modelos de locomotivas atualmente utilizadas pelas principais\nferrovias brasileiras, bem como seus componentes elétricos, eletrônicos e mecânicos, e o funcionamento\nde todos como um sistema. Serão também apresentados os modelos/tipos de vagões ferroviários e uma\nbreve introdução ao sistema de sinalização ferroviárias."}, {"id": "4597", "t": "O IFES é o meu lugar", "c": "Augusto Cesar Machado Ramos", "cs": "augusto-cesar-machado-ramos", "tp": "Projeto", "ano": "2023", "n": 87, "b": "O IFES é o meu lugar Augusto Cesar Machado Ramos Projeto Extensão Educação Ciências Humanas SEM VÍNCULO 23158.002326/2023-88 O Instituto Federal do Espírito Santo – Campus Serra foi inaugurado em 2001, e desde então\noferta cursos técnicos subsequentes e, posteriormente, cursos superiores e mestrado\nprofissional. Somente a partir de 2017, considerando-se as expectativas da comunidade local,\nesse campus passou a ofertar o ensino médio integrado à educação profissional, o que\nsignificou um grande avanço no que diz respeito"}, {"id": "4617", "t": "Projeto Expedição IFES", "c": "Bene Regis Figueiredo", "cs": "bene-regis-figueiredo", "tp": "Evento", "ano": "2023", "n": 87, "b": "Projeto Expedição IFES Bene Regis Figueiredo Evento Ensino Cultura Ciências Humanas SEM VÍNCULO 23158.002529/2023-74 - visita guiada pela trilha do ouro, observando os aspectos da mata nativa. Abordando, também, a\nforma como a estrada foi construída, a partir de uma aula sobre as questões históricas da travessia do\nouro, desde as cidades de extração até o porto de Paraty, e suas implicações, com explicação de\ntermos oriundos da época, como “santo do pau oco, etc.\n- passeio de escuna com visitação às ilhas histór"}, {"id": "4626", "t": "Oficina de Libras na prática", "c": "Emilene Coco dos Santos", "cs": "emilene-coco-dos-santos", "tp": "Evento", "ano": "2023", "n": 19, "b": "Oficina de Libras na prática Emilene Coco dos Santos Evento Ensino Educação Linguística, Letras e Artes SEM VÍNCULO 23158.002356/2023-94 Este projeto trata da oferta de uma ação de ensino, Oficina de Libras na prática, aos\nestudantes dos cursos Técnicos Integrados ao Ensino Médio, Técnicos ,Graduação, PósGraduação, Proeja, do campus Serra. Por meio de aulas expositivas, dinâmicas, práticas e\ninteração, será uma oportunidade para o desenvolvimento de práticas inclusivas e\nacessíveis. Os encontros acontecerão semanalmente, às terças-"}, {"id": "4629", "t": "“Conversando sobre”", "c": "Erica Giles Bragança", "cs": null, "tp": "Evento", "ano": "2023", "n": 6, "b": "“Conversando sobre” Erica Giles Bragança Evento Ensino Educação Ciências Sociais Aplicadas SEM VÍNCULO 23158.002449/2023-1 volvimento de Soluções (LEDS) do Instituto\nFederal de Educação, Ciência e Tecnologia do Espírito Santo (IFES). O projeto tem como\nobjetivo a realização de pesquisas e o desenvo"}, {"id": "4846", "t": "PEAM – Programa de Estudos Avançados em Matemática", "c": "Paulo Cezar Camargo Guedes", "cs": "paulo-cezar-camargo-guedes", "tp": "Evento", "ano": "2023", "n": 0, "b": "PEAM – Programa de Estudos Avançados em Matemática Paulo Cezar Camargo Guedes Evento Ensino Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.003479/2023-42 Esta proposta de atividade complementar ao ensino consiste no oferecimento de encontros semanais\naos estudantes dos cursos técnicos integrados ao Ensino Médio, abordando tópicos da área de\nMatemática não totalmente contemplados no currículo escolar dos estudantes, seja em sua variedade\ne/ou profundidade."}, {"id": "4847", "t": "Projeto Avançar – Nivelamento em Matemática", "c": "Augusto Cesar Machado Ramos", "cs": "augusto-cesar-machado-ramos", "tp": "Curso", "ano": "2023", "n": 2, "b": "Projeto Avançar – Nivelamento em Matemática Augusto Cesar Machado Ramos Curso Ensino Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.003752/2023-39 A ação objetiva alinhar e sistematizar uma proposta de intervenção pedagógica que visa minimizar às\nlacunas no processo de aprendizagem trazidas pelos alunos ingressantes nos Cursos Técnicos\nIntegrados ao Ensino Médio do Ifes – Campus Serra. A designação AVANÇAR, foi pensada no sentido de\no aluno adquirir o conhecimento necessário para AVANÇAR e superar suas dificuldades. Nesse sentido,\no Projeto "}, {"id": "4867", "t": "Empresa Morpheus Jr", "c": "Adelson Pereira do Nascimento", "cs": "adelson-pereira-do-nascimento", "tp": "Programa", "ano": "2024", "n": 0, "b": "Empresa Morpheus Jr Adelson Pereira do Nascimento Programa Extensão Educação Ciências Sociais Aplicadas SEM VÍNCULO 23158.000381/2018-76 A Empresa Júnior tem o papel de, conforme a Lei 13.267/2016, proporcionar a seus membros as\ncondições necessárias para a aplicação prática dos conhecimentos teóricos referentes à respectiva\nárea de formação profissional, aperfeiçoar o processo de formação dos profissionais em nível superior;\nestimular o espírito empreendedor e promover o desenvolvimento técnico, acadêmico, pessoal e\nprofissional d"}, {"id": "4894", "t": "Jogos Internos do Campus Serra", "c": "Milainy Ludmila Santos Goulart", "cs": null, "tp": "Evento", "ano": "2024", "n": 51, "b": "Jogos Internos do Campus Serra Milainy Ludmila Santos Goulart Evento Ensino Cultura Ciências da Saúde SEM VÍNCULO 23158.000310/2024-11 Os Jogos Internos do Campus Serra serão realizados em duas etapas durante o ano\nletivo de 2024. Nos meses de abril e outubro, alunos e servidores do campus terão a oportunidade de\nparticiparem de competições esportivas e prestigiarem apresentações artístico-culturais. Surge como\nproposta de formação visando o fomento ao lazer, esporte e cultura."}, {"id": "4962", "t": "SEMANA DE INTEGRAÇÃO", "c": "Wagner Kirmse Caldas", "cs": "wagner-kirmse-caldas", "tp": "Curso", "ano": "2024", "n": 0, "b": "SEMANA DE INTEGRAÇÃO Wagner Kirmse Caldas Curso Ensino Educação Ciências Exatas e da Terra SEM VÍNCULO 23158.000513/2024-16 A Semana de Integração do IFES, realizada nos dois semestres do ano, tem como\nobjetivo promover a integração das diversas áreas do conhecimento através de eventos científicos,\nacadêmicos, culturais, artísticos e desportivos. Essa ação é fundamental como complemento ao\nensino, proporcionando aos alunos a oportunidade de aplicar na prática os conhecimentos adquiridos\nem sala de aula, estimulando o d"}, {"id": "5016", "t": "CAIS: Ancorando Cultura e Arte no Ifes Serra", "c": "Emerson Atílio Birchler", "cs": "emerson-atilio-birchler", "tp": "Projeto", "ano": "2024", "n": 0, "b": "CAIS: Ancorando Cultura e Arte no Ifes Serra Emerson Atílio Birchler Projeto Extensão Cultura Linguística, Letras e Artes SEM VÍNCULO 23158.000377/2024-56 O Programa CAIS “Ancorando Cultura e Arte no anais\nd"}, {"id": "5138", "t": "Semana destinada à Educação Especial Inclusiva - Setembro Verde", "c": "Emilene Coco dos Santos", "cs": "emilene-coco-dos-santos", "tp": "Evento", "ano": "2024", "n": 222, "b": "Semana destinada à Educação Especial Inclusiva - Setembro Verde Emilene Coco dos Santos Evento Ensino Educação Ciências Humanas SEM VÍNCULO 23158.001293/2024-30 Este projeto trata da proposta para a Semana destinada à Educação Especial Inclusiva - Setembro Verde prevista no calendário acadêmico no ano de 2024. Essa ação possibilitará a reflexão e debate sobre os desafios vividos pelas pessoas com deficiência na sociedade excludente. Setembro verde é o mês de conscientizar a população sobre a importância da inclusão social de pessoas com deficiência. Assim"}, {"id": "5184", "t": "Introdução à Linguagem LáTex para escrita de materiais acadêmicos", "c": "Vinícius Secchin de Melo", "cs": null, "tp": "Curso", "ano": "2024", "n": 12, "b": "Introdução à Linguagem LáTex para escrita de materiais acadêmicos Vinícius Secchin de Melo Curso Ensino Educação Engenharias SEM VÍNCULO 23158.001120/2024-11 O presente curso visa proporcionar ao aluno uma formação complementar na área\nde programação, em particular a utilização da ferramenta LaTex na edição e escrita de materiais\nacadêmicos, tais como trabalhos de conclusão de curso, teses e dissertações, entre outors. O LáTex vem\nsendo uma importante ferramenta para a escrita de materiais com qualidade não somente de texto,\nmas principalmente quando e"}, {"id": "5199", "t": "JOVEM APRENDIZ IFES CAMPUS SERRA", "c": "Adelson Pereira do Nascimento", "cs": "adelson-pereira-do-nascimento", "tp": "Programa", "ano": "2024", "n": 0, "b": "JOVEM APRENDIZ IFES CAMPUS SERRA Adelson Pereira do Nascimento Programa Extensão Trabalho Ciências Sociais Aplicadas SEM VÍNCULO 23158.001999/2024-00 O projeto \"Jovem Aprendiz\" do IFES Campus Serra, em parceria com o Instituto Xavier e a Corpus\nSaneamento, tem como objetivo oferecer uma formação ica. Criado com base em demandas sociais e educacionais do território, o NEA visa\ndesenvolver práticas formativas interdisciplinares, promover a integração com a comunidade local e\nr"}, {"id": "5545", "t": "Palestra -Lançamento de documentário: A beleza oculta no poder feminino", "c": "Adrianna Machado Meneguelli", "cs": null, "tp": "Evento", "ano": "2025", "n": 0, "b": "Palestra -Lançamento de documentário: A beleza oculta no poder feminino Adrianna Machado Meneguelli Evento Ensino Cultura Linguística, Letras e Artes SEM VÍNCULO 23158.000985/2025-41 Lançamento do filme “A beleza oculta no poder feminino”, de Dora \nVergueiro, que estará presente e participará de uma roda de conversa com o público \nparticipante sobre o documentário."}, {"id": "5546", "t": "Clube de leitura", "c": "Alexander Jeferson Nassau Borges", "cs": null, "tp": "Curso", "ano": "2025", "n": 0, "b": "Clube de leitura Alexander Jeferson Nassau Borges Curso Ensino Educação Linguística, Letras e Artes SEM VÍNCULO 23158.000898/2025-94 O Clube de Leitura propõe a aproximação dos alunos com a prática leitora \nvisando à expansão de conhecimento, a uma visão de mundo mais refinada e crítica, ao \ncrescimento pessoal e à formação cidadã. A proposta partirá da escolha – conduzida pelos \nprofessores envolvidos – de uma obra significativa para ser lida e discutida no espaço de um \nmês, a partir de dois encontros quinzenais, em formato h"}, {"id": "5641", "t": "LabMaker 4.0: capacitando professores para a cultura maker e tecnologias da Indústria 4.0", "c": "Rosiane Ribeiro Rocha", "cs": "rosiane-ribeiro-rocha", "tp": "Projeto", "ano": "2025", "n": 73, "b": "LabMaker 4.0: capacitando professores para a cultura maker e tecnologias da Indústria 4.0 Rosiane Ribeiro Rocha Projeto Extensão Educação Engenharias PAEX-IFES 23158.001715/2025-58 O projeto “LabMaker 4.0: capacitando professores para a cultura maker e tecnologias da indústria 4.0”\ntem como principal objetivo capacitar professores da rede pública de es artístico-culturais. Surge como\nproposta de formação visando o fomento ao lazer, esporte e cultura."}, {"id": "617", "t": "Sistema de Informação para Notificação, Captação, Distribuição de Órgão", "c": "Rodrigo Fernandes Calhau", "cs": "rodrigo-fernandes-calhau", "tp": "Projeto", "ano": "2016", "n": 0, "b": "Sistema de Informação para Notificação, Captação, Distribuição de Órgão Rodrigo Fernandes Calhau Projeto Extensão Saúde Ciências Exatas e da Terra PAEX-IFES 23158.000540/2015-91 O presente projeto partiu de necessidades da CNCDO/ES – Central de Notificação, Captação e Distribuição de Órgãos do Espírito Santo – no controle e avaliação de notificações de Óbitos feita pelos hospitais notificantes do estado para realização de doações de órgãos e tecidos. Atualmente esse processo ocorre sem apoio nenhum de um sistema computacional. As notificações de óbito ocorrem via formulár"}, {"id": "628", "t": "Gametalk: vamos falar sobre games?", "c": "Ana Paula Klauck", "cs": "ana-paula-klauck", "tp": "Curso", "ano": "2016", "n": 3, "b": "Gametalk: vamos falar sobre games? Ana Paula Klauck Curso Extensão Tecnologia e Produção Ciências Exatas e da Terra PAEX-IFES 23158.000808/2015-93 \"Gametalk vamos falar sobre games?\" integra tecnologia e cultura, tratando de uma expressão cultural muito popular na atualidade: os jogos digitais, aos quais a maioria dos jovens dedica seu tempo e interesse, segundo seus próprios relatos. Ao reconhecer e estimular o interesse na área, o evento pretende mostrar que o campus está engajado às tendências de tecnologia do mercado do entretenimento e "}, {"id": "640", "t": "Introdução à Programação Competitiva", "c": "Jefferson Oliveira Andrade", "cs": "jefferson-oliveira-andrade", "tp": "Curso", "ano": "2016", "n": 2, "b": "Introdução à Programação Competitiva Jefferson Oliveira Andrade Curso Extensão Tecnologia e Produção Ciências Exatas e da Terra PAEX-IFES 23158.000470/2015-71 Oferecer aulas teóricas e práticas de resolução de problemas compu const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
IDX.forEach(a => a.nb = norm(a.b));
const inp = document.getElementById('q'), out = document.getElementById('res');
function render(q){
  out.innerHTML='';
  const termos = norm(q.trim()).split(/\s+/).filter(t=>t.length>=2);
  if(!termos.length){out.innerHTML='<p class="vazio">Digite palavras-chave: tema (robótica, inglês, saúde), coordenador(a), tipo (curso, evento), fomento, ano...</p>';return;}
  const hits = IDX.filter(a => termos.every(t => a.nb.includes(t)))
                  .sort((x,y)=>y.n-x.n);
  if(!hits.length){out.innerHTML='<p class="vazio">Nada encontrado para esses termos. Tente palavras mais gerais.</p>';return;}
  let h = `<div class="card" style="margin-top:14px"><p class="sec-desc">${hits.length} ação(ões) encontrada(s)</p><table class="tb"><tr><th>Ação</th><th>Coordenador(a)</th><th>Tipo</th><th>Ano</th><th>Participações</th></tr>`;
  for(const a of hits)
    h += `<tr><td><a class="lk" href="acoes/${a.id}.html">${a.t}</a></td><td>${a.cs?`<a class="lk" href="extensionistas/${a.cs}.html">${a.c}</a>`:a.c}</td><td>${a.tp}</td><td>${a.ano}</td><td>${a.n}</td></tr>`;
  out.innerHTML = h + '</table></div>';
}
inp.addEventListener('input', e=>render(e.target.value)); render('');
</script>
